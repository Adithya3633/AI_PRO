{% extends "base.html" %}
{% block title %}Coding Challenge{% endblock %}
{% block content %}
<section class="mx-auto max-w-4xl px-4 py-10">
    <div class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
        <p class="text-sm font-semibold text-blue-600">{{ role.role_name }}</p>
        <h1 class="text-3xl font-bold">Coding Challenge</h1>
        <div class="mt-5 rounded-md bg-slate-50 p-4">
            <p class="font-semibold">Problem statement</p>
            <p class="mt-2 text-slate-700">{{ problem }}</p>
        </div>
        <form method="post" class="mt-6 grid gap-4">
            {% csrf_token %}
            <textarea name="submitted_code" rows="12" class="font-mono w-full rounded-md border border-slate-300 p-3" placeholder="Write your code here..."></textarea>
            <button class="rounded-md bg-blue-600 px-4 py-3 font-semibold text-white">Submit Code</button>
        </form>
        {% if saved %}
            <p class="mt-4 rounded-md bg-emerald-50 p-4 text-emerald-900">Code saved successfully.</p>
        {% endif %}
    </div>
</section>
{% endblock %}
