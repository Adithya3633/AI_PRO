{% extends "base.html" %}
{% block title %}Subjective Interview{% endblock %}
{% block content %}
<section class="mx-auto max-w-4xl px-4 py-10">
    <div class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
        <p class="text-sm font-semibold text-blue-600">{{ role.role_name }}</p>
        <h1 class="text-3xl font-bold">Subjective AI Interview</h1>
        <form method="post" class="mt-6 grid gap-4">
            {% csrf_token %}
            <input type="hidden" name="question" value="{{ question }}">
            <div class="rounded-md bg-slate-50 p-4">
                <p class="font-semibold">Question</p>
                <p class="mt-2 text-slate-700">{{ question }}</p>
            </div>
            <label class="font-semibold" for="answer">Your answer</label>
            <textarea id="answer" name="answer" rows="8" class="w-full rounded-md border border-slate-300 p-3" placeholder="Type your answer here..."></textarea>
            <button class="rounded-md bg-blue-600 px-4 py-3 font-semibold text-white">Evaluate Answer</button>
        </form>
        {% if result %}
            <div class="mt-6 rounded-md border border-emerald-200 bg-emerald-50 p-4">
                <p class="text-lg font-bold">Score: {{ result.score }}/100</p>
                <p class="mt-2 text-emerald-950">{{ result.feedback }}</p>
            </div>
        {% endif %}
    </div>
</section>
{% endblock %}
