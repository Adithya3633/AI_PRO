{% extends "base.html" %}
{% block title %}MCQ Test{% endblock %}
{% block content %}
<section class="mx-auto max-w-4xl px-4 py-10">
    <div class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
        <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
            <div>
                <p class="text-sm font-semibold text-blue-600">{{ role.role_name }}</p>
                <h1 class="text-2xl font-bold">MCQ Interview</h1>
            </div>
            <div class="rounded-md bg-slate-900 px-4 py-2 font-semibold text-white">Time: <span id="timer">--:--</span></div>
        </div>
        <div class="mt-6 h-3 rounded-full bg-slate-200"><div id="progressBar" class="h-3 rounded-full bg-blue-600 transition-all" style="width: 0%"></div></div>
        <div id="questionBox" class="mt-8"></div>
        <div class="mt-8 flex justify-between">
            <button id="prevBtn" class="rounded-md border border-slate-300 px-4 py-2 font-semibold">Previous</button>
            <button id="nextBtn" class="rounded-md bg-blue-600 px-4 py-2 font-semibold text-white">Next</button>
        </div>
    </div>
</section>
{% endblock %}
{% block scripts %}
{{ questions|json_script:"questions-data" }}
<script>
    window.MCQ_CONFIG = {
        roleId: {{ role.id }},
        durationSeconds: {{ duration_seconds }},
        submitUrl: "{% url 'mcq_submit' %}",
        csrfToken: "{{ csrf_token }}"
    };
</script>
<script src="/static/js/mcq.js?v=2"></script>
{% endblock %}
