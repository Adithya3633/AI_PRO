{% extends "base.html" %}
{% block title %}MCQ Result{% endblock %}
{% block content %}
<section class="mx-auto max-w-3xl px-4 py-10">
    <div class="rounded-lg border border-slate-200 bg-white p-6 text-center shadow-sm">
        <p class="text-sm font-semibold text-blue-600">{{ result.role.role_name }}</p>
        <h1 class="mt-2 text-3xl font-bold">Your Result</h1>
        <p class="mt-6 text-6xl font-bold text-slate-950">{{ result.score }}/{{ result.total_questions }}</p>
        <p class="mt-2 text-xl text-slate-600">{{ result.percentage }}% accuracy</p>
        <div class="mx-auto mt-6 h-3 max-w-md rounded-full bg-slate-200"><div class="h-3 rounded-full bg-emerald-500" style="width: {{ result.percentage }}%"></div></div>
        <div class="mt-8 flex justify-center gap-3">
            <a class="rounded-md bg-blue-600 px-4 py-3 font-semibold text-white" href="{% url 'mcq_start' result.role.id %}">Retake</a>
            <a class="rounded-md border border-slate-300 px-4 py-3 font-semibold" href="{% url 'dashboard' %}">Dashboard</a>
        </div>
    </div>
</section>
{% endblock %}
