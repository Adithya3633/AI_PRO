{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<section class="mx-auto max-w-md px-4 py-12">
    <div class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
        <h1 class="text-2xl font-bold">Create account</h1>
        <form method="post" class="mt-6 grid gap-4">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="rounded-md bg-blue-600 px-4 py-3 font-semibold text-white">Register</button>
        </form>
        <p class="mt-4 text-sm text-slate-600">Already have an account? <a class="font-semibold text-blue-600" href="{% url 'login' %}">Login</a></p>
    </div>
</section>
{% endblock %}
